# Reverse proxy for credit-core — api + 4 role subdomains.
# Serves BOTH schemes: plain HTTP on :80 AND HTTPS on :443 (TLS terminates here) — no
# forced redirect, either works. Published on 8080 (HTTP) + 9443 (HTTPS); the edge (87.x)
# forwards public 80/443 to them.
#
# The :443 listener needs a cert at /etc/nginx/certs/live/creditcore.uz/. deploy/deploy.sh
# drops a self-signed fallback if none exists (so nginx always starts), and
# deploy/init-letsencrypt.sh replaces it with a real Let's Encrypt cert.

map $host $web_upstream {
    operator.creditcore.uz   web-operator;
    moderator.creditcore.uz  web-moderator;
    director.creditcore.uz   web-director;
    admin.creditcore.uz      web-admin;
}

# Docker's embedded DNS — resolve upstreams at request time so a backend/web restart
# yields a recoverable 502 instead of crashing nginx with "host not found in upstream".
# Also required for the variable proxy_pass targets below to resolve at all.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── api.creditcore.uz → NestJS backend (HTTP :80 + HTTPS :443) ──────────────────
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name api.creditcore.uz;

    ssl_certificate     /etc/nginx/certs/live/creditcore.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/creditcore.uz/privkey.pem;

    # Kept so real TLS can be issued later (deploy/init-letsencrypt.sh) without edits.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff always;

    # Variable targets resolved at request time (see resolver above) — Docker DNS returns all replica
    # IPs and nginx round-robins across them, so `backend` load-balances over its 3 replicas.
    set $backend_upstream backend;
    set $ocr_upstream ocr;

    # OCR scans are CPU-heavy and slow — send them to the dedicated, CPU-capped `ocr` service so they
    # never compete with the API on the backend replicas. The longer timeout is scoped to scans only
    # (a queued scan can exceed nginx's 60s default), NOT the general API.
    location /passport/ {
        proxy_pass http://$ocr_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://$backend_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── operator/moderator/director/admin.creditcore.uz → per-role static web app ──
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    ssl_certificate     /etc/nginx/certs/live/creditcore.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/creditcore.uz/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://$web_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
