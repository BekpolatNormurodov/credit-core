# Reverse proxy for credit-core. Each role gets its own subdomain.
# Build VITE_API_URL=https://api.creditcore.uz before building the web images.

map $host $web_upstream {
    operator.creditcore.uz   web-operator;
    moderator.creditcore.uz  web-moderator;
    director.creditcore.uz   web-director;
    admin.creditcore.uz      web-admin;
}

# API → NestJS backend
server {
    listen 80;
    server_name api.creditcore.uz;

    client_max_body_size 25m;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Web apps (static, served by their own nginx containers)
server {
    listen 80;
    server_name operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    location / {
        proxy_pass http://$web_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# NOTE: add TLS (Let's Encrypt/certbot) server blocks on 443 referencing
# /etc/nginx/certs and redirect 80→443 once certificates are issued.
