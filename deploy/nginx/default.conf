# Reverse proxy for credit-core — api + 4 role subdomains, TLS terminated HERE.
# Published on 8080 (HTTP) + 9443 (HTTPS); the edge (87.x) forwards public 80/443 to them.
# Web builds bake VITE_API_URL=https://api.creditcore.uz.

# Docker's embedded DNS. Resolving upstreams at request time (not just at startup) keeps
# nginx alive when backend/web containers restart or are briefly down — a recoverable 502
# instead of an [emerg] "host not found in upstream" crash-loop. It's also required for the
# variable proxy_pass targets below ($backend_upstream / $web_upstream) to resolve at all.
resolver 127.0.0.11 valid=10s ipv6=off;

map $host $web_upstream {
    operator.creditcore.uz   web-operator;
    moderator.creditcore.uz  web-moderator;
    director.creditcore.uz   web-director;
    admin.creditcore.uz      web-admin;
}

# ── HTTP (80, reached via edge :80 -> :8080): ACME challenge + redirect to HTTPS ──
server {
    listen 80;
    server_name api.creditcore.uz operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (443, reached via edge :443 -> :9443): API → NestJS backend ──────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.creditcore.uz;

    ssl_certificate     /etc/nginx/certs/live/creditcore.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/creditcore.uz/privkey.pem;

    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff always;

    # Variable target → resolved per request via the resolver above, so a backend restart
    # is a momentary 502, not a config-load failure that takes nginx down with it.
    set $backend_upstream backend;

    location / {
        proxy_pass http://$backend_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS (443): role web apps (static, per-role nginx container) ───────────────
server {
    listen 443 ssl;
    http2 on;
    server_name operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    ssl_certificate     /etc/nginx/certs/live/creditcore.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/creditcore.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://$web_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
