# HTTP-only reverse proxy for credit-core — api + 4 role subdomains, NO TLS.
# Served on :80 (published as 8080; the edge (87.x) forwards public :80 -> :8080).
# For this to work end-to-end the web images must be built with
# VITE_API_URL=http://api.creditcore.uz and CORS_ORIGINS must list the http:// origins.
#
# To switch back to HTTPS later: restore the TLS server blocks from git history
#   git show c1d24eb:deploy/nginx/default.conf
# and run deploy/init-letsencrypt.sh to issue the certificates.

map $host $web_upstream {
    operator.creditcore.uz   web-operator;
    moderator.creditcore.uz  web-moderator;
    director.creditcore.uz   web-director;
    admin.creditcore.uz      web-admin;
}

# Docker's embedded DNS — resolve upstreams at request time so a backend/web restart
# yields a recoverable 502 instead of crashing nginx with "host not found in upstream".
# Also required for the variable proxy_pass targets below to resolve at all.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── api.creditcore.uz → NestJS backend ─────────────────────────────────────────
server {
    listen 80;
    server_name api.creditcore.uz;

    # Kept so TLS can be obtained later (deploy/init-letsencrypt.sh) without editing this file.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff always;

    set $backend_upstream backend;
    location / {
        proxy_pass http://$backend_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── operator/moderator/director/admin.creditcore.uz → per-role static web app ──
server {
    listen 80;
    server_name operator.creditcore.uz moderator.creditcore.uz director.creditcore.uz admin.creditcore.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://$web_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
