# Production compose — NOT used in local dev (dev runs against the local MySQL80).
# Subdomains: operator/moderator/director/admin.creditcore.uz + api.creditcore.uz
# nginx terminates TLS itself and is published directly on the host's 80 (HTTP) + 443 (HTTPS).
# Usage: docker compose --env-file deploy/.env up -d --build
#
# Topology (isolate the CPU-heavy OCR so it never starves the API):
#   mysql      — DB (buffer pool tuned via MYSQL_BUFFER_POOL)
#   migrate    — one-shot: prisma db push, then exits (single schema sync; no replica race)
#   scheduler  — 1 instance, RUN_SCHEDULER=1: runs the @Cron jobs (deadlines, retention) exactly once
#   backend    — API, 3 replicas behind nginx (round-robin). Scans are NOT served here.
#   ocr        — 1 instance, CPU-capped: nginx routes /passport/* here so OCR can't steal the API's cores
#   web-*      — per-role static SPA (operator scaled to 3)
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # InnoDB caches data+indexes in the buffer pool; the 128M default is tiny and forces disk reads.
    # 512M caches this DB's working set in RAM (safe on a 2GB+ box). Tune to the server: ~50-70% of
    # RAM on a DB-dedicated host, less when the box is shared with the backend/OCR — set MYSQL_BUFFER_POOL.
    command: >-
      --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL:-512M}
      --max-connections=${MYSQL_MAX_CONN:-150}
    environment:
      MYSQL_DATABASE: credit_core
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    # Not exposed to the host in prod — only the compose network reaches it.

  # One-shot schema sync. Runs once, exits; backend/ocr/scheduler wait for it to COMPLETE before
  # starting, so 3 backend replicas never race to `prisma db push` concurrently.
  migrate:
    image: credit-core-backend
    command: ["sh", "-c", "npx prisma db push --skip-generate --accept-data-loss"]
    env_file:
      - deploy/.env
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy

  # Runs the @Cron jobs exactly once (RUN_SCHEDULER=1). Serves the app too, but nginx never routes to it.
  scheduler:
    image: credit-core-backend
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      RUN_SCHEDULER: "1"
      UPLOAD_DIR: /data/uploads
      BACKEND_PORT: 3000
    volumes:
      - uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    image: credit-core-backend
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      UPLOAD_DIR: /data/uploads
      BACKEND_PORT: 3000
    volumes:
      - uploads:/data/uploads
    # API is light — 3 replicas for concurrency/resilience (nginx round-robins). No cron here.
    deploy:
      replicas: 3
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # OCR workers — nginx round-robins /passport/* across the replicas, so several operators can scan at
  # once without blocking each other. Each replica is CPU-capped; on a 12-core box the default
  # 3 replicas × 3 cores = 9 leaves ~3 for the API. Per replica: OCR_MAX_CONCURRENT=1 scan at a time,
  # OCR_WORKERS tesseract workers (sized to the cap). Fewer/bigger replicas = faster single scans but
  # less parallelism; more/smaller = more parallel but slower each. Tune OCR_REPLICAS/OCR_CPUS/OCR_WORKERS.
  ocr:
    image: credit-core-backend
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      UPLOAD_DIR: /data/uploads
      BACKEND_PORT: 3000
      OCR_MAX_CONCURRENT: ${OCR_MAX_CONCURRENT:-1}
      OCR_WORKERS: ${OCR_WORKERS:-4}
    volumes:
      - uploads:/data/uploads
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "${OCR_CPUS:-3}"
          memory: ${OCR_MEM:-2500m}
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web-operator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-operator, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    image: credit-core-web-operator
    restart: unless-stopped
    deploy:
      replicas: 3
  web-moderator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-moderator, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped
  web-director:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-director, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped
  web-admin:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-admin, VITE_API_URL: "${VITE_API_URL:-https://api.creditcore.uz}" } }
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Published directly on the host's 80 (HTTP) + 443 (HTTPS); nginx terminates TLS here.
    # Host 80/443 must be free — check: sudo ss -ltnp | grep -E ':80 |:443 '
    # (if a host nginx/apache holds them: sudo systemctl disable --now nginx).
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - ocr
      - web-operator
      - web-moderator
      - web-director
      - web-admin

  # TLS: issued once via deploy/init-letsencrypt.sh, then auto-renews here.
  # ACME http-01 reaches us through the edge: public :80 -> this host :8080 -> nginx :80.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  uploads:
  certbot_www:
