# Production compose — NOT used in local dev (dev runs against the local MySQL80).
# Subdomains: operator/moderator/director/admin.creditcore.uz + api.creditcore.uz
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: credit_core
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3307:3306'

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/credit_core
      JWT_SECRET: ${JWT_SECRET:-change-me}
      UPLOAD_DIR: /data/uploads
      BACKEND_PORT: 3000
      CORS_ORIGINS: https://operator.creditcore.uz,https://moderator.creditcore.uz,https://director.creditcore.uz,https://admin.creditcore.uz
    volumes:
      - uploads:/data/uploads
    depends_on:
      - mysql

  web-operator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-operator } }
    restart: unless-stopped
  web-moderator:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-moderator } }
    restart: unless-stopped
  web-director:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-director } }
    restart: unless-stopped
  web-admin:
    build: { context: ., dockerfile: deploy/Dockerfile.web, args: { APP: web-admin } }
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - web-operator
      - web-moderator
      - web-director
      - web-admin

volumes:
  mysql_data:
  uploads:
